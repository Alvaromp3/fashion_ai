# ML en Docker: publica modelos con ./scripts/publish-models-release.sh models-v1.0
# Luego: export GITHUB_REPO=tu-usuario/repo && docker compose -f docker-compose.ml.yml build

services:
  ml:
    image: fashion-ml
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      # Forzar el modelo ViT nuevo (host -> container).
      ML_VIT_PATH: /app/models/best_model_17_marzo.keras
      # CNN ya no se usa (se deja vacío / inexistente).
      ML_CNN_PATH: /app/models/modelo_ropa.h5
    volumes:
      - /Users/alvaromartin-pena/Desktop/vit_fashion_outputs/best_model_17_marzo.keras:/app/models/best_model_17_marzo.keras:ro
    ports:
      - "6001:6001"
    container_name: fashion-ml
