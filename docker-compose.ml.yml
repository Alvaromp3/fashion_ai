# ML en Docker: publica el modelo con ./scripts/publish-models-release.sh models-v1.0
# Luego: export GITHUB_REPO=tu-usuario/repo && docker compose -f docker-compose.ml.yml build

services:
  ml:
    image: fashion-ml
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      ML_VIT_PATH: /app/models/best_model_17_marzo.keras
    # Opcional: montar pesos locales (descomenta y coloca best_model_17_marzo.keras en ml-service/models/)
    # volumes:
    #   - ./ml-service/models/best_model_17_marzo.keras:/app/models/best_model_17_marzo.keras:ro
    ports:
      - "6001:6001"
    container_name: fashion-ml
